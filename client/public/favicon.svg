<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#1e3a5f" rx="40"/>
  
  <!-- Graduation Cap (Mortarboard) -->
  <!-- Main cap board - trapezoid shape -->
  <path d="M 50 100 L 70 70 L 130 70 L 150 100 Z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Board flat top -->
  <line x1="70" y1="70" x2="130" y2="70" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Left side of board -->
  <line x1="50" y1="100" x2="70" y2="70" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right side of board -->
  <line x1="130" y1="70" x2="150" y2="100" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Front edge of board -->
  <line x1="50" y1="100" x2="150" y2="100" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center button -->
  <circle cx="100" cy="85" r="3" fill="white"/>
  
  <!-- Tassel -->
  <!-- Tassel thread -->
  <line x1="100" y1="100" x2="100" y2="135" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Tassel bulb at bottom -->
  <circle cx="100" cy="145" r="6" fill="white"/>
  
  <!-- Small loop at top of tassel -->
  <circle cx="100" cy="100" r="2" fill="white"/>
</svg>